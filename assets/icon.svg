<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="240" fill="#16213e" stroke="#0f3460" stroke-width="4"/>

  <!-- Monster body -->
  <rect x="116" y="160" width="280" height="200" rx="32" fill="#e94560"/>
  <rect x="116" y="160" width="280" height="200" rx="32" fill="url(#bodyGrad)"/>

  <!-- Gradient for body -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b81" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Screen/monitor on monster belly -->
  <rect x="166" y="200" width="180" height="110" rx="12" fill="#0a0a1a"/>
  <rect x="174" y="208" width="164" height="94" rx="8" fill="#1a1a2e"/>

  <!-- Play triangle on screen -->
  <polygon points="236,235 236,275 272,255" fill="#e94560" opacity="0.9"/>

  <!-- REC dot on screen -->
  <circle cx="196" cy="224" r="6" fill="#e94560"/>
  <text x="210" y="229" font-family="sans-serif" font-size="14" font-weight="700" fill="#e94560">REC</text>

  <!-- Monster eyes -->
  <ellipse cx="200" cy="176" rx="28" ry="30" fill="#fff"/>
  <ellipse cx="312" cy="176" rx="28" ry="30" fill="#fff"/>
  <circle cx="208" cy="174" r="14" fill="#1a1a2e"/>
  <circle cx="320" cy="174" r="14" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="214" cy="168" r="5" fill="#fff"/>
  <circle cx="326" cy="168" r="5" fill="#fff"/>

  <!-- Monster horns -->
  <polygon points="180,148 165,100 210,140" fill="#c73652"/>
  <polygon points="332,148 347,100 302,140" fill="#c73652"/>

  <!-- Monster teeth -->
  <rect x="196" y="348" width="24" height="20" rx="4" fill="#fff"/>
  <rect x="232" y="348" width="24" height="24" rx="4" fill="#fff"/>
  <rect x="268" y="348" width="24" height="20" rx="4" fill="#fff"/>
  <rect x="304" y="348" width="24" height="18" rx="4" fill="#fff"/>

  <!-- Monster feet -->
  <ellipse cx="186" cy="378" rx="40" ry="16" fill="#c73652"/>
  <ellipse cx="326" cy="378" rx="40" ry="16" fill="#c73652"/>

  <!-- Monster arms -->
  <rect x="88" y="230" width="36" height="80" rx="18" fill="#e94560"/>
  <rect x="388" y="230" width="36" height="80" rx="18" fill="#e94560"/>

  <!-- Antenna -->
  <line x1="256" y1="148" x2="256" y2="108" stroke="#c73652" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="100" r="10" fill="#ff6b81"/>
</svg>
